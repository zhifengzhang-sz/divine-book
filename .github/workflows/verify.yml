name: Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies and run verification
        shell: bash
        run: |
          set -euo pipefail
          echo "Installing Bun..."
          curl -fsSL https://bun.sh/install | bash -s -- -y
          export PATH="$HOME/.bun/bin:$PATH"
          bun install
          echo "Run convenience verification script"
          bash scripts/run-verify.sh
